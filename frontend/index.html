<!doctype html>
<html lang="fr" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Gestion, Dépenses du foyer</title>
    <meta name="description" content="Suivi des dépenses du foyer, remboursements et finances personnelles" />
    <script>
      // Apply the saved (or OS-preferred) theme before React mounts, so there is
      // no flash and the `dark` class is the single source of truth the app reads.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
